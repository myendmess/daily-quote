name: Daily Commit

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Daily motivational commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RESPONSE=$(curl -s "https://zenquotes.io/api/random")
          QUOTE=$(echo "$RESPONSE" | jq -r '.[0].q')
          AUTHOR=$(echo "$RESPONSE" | jq -r '.[0].a')

          EXISTING=$(grep -c "^- Day" README.md 2>/dev/null || echo 0)
          DAY=$((EXISTING + 3))

          echo "- Day $DAY - \"$QUOTE\" — $AUTHOR" >> README.md

          git add README.md
          git commit -m "Day $DAY: \"$QUOTE\" — $AUTHOR"
          git pull --rebase origin main
          git push
